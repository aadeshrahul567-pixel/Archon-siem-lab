<ossec_config>

  <!-- ===================== CLIENT (MANAGER CONNECTION) ===================== -->
  <client>
    <server>
      <address>192.168.X.X</address>  <!-- Replace with your Wazuh Manager IP -->
      <port>1514</port>
      <protocol>udp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- ===================== SYSCHECK / FILE INTEGRITY MONITORING ===================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- Monitor Windows system directories -->
    <directories check_all="yes">%WINDIR%\System32\drivers\etc</directories>
    <directories check_all="yes">%PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\Startup</directories>

    <!-- Monitor custom folder in real-time (change path as needed) -->
    <directories realtime="yes">C:\Users\YourUsername\Test</directories>

    <!-- Ignore temp/noisy paths -->
    <ignore>%PROGRAMDATA%\Microsoft\Windows Defender</ignore>
  </syscheck>

  <!-- ===================== ROOTCHECK ===================== -->
  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>yes</windows_apps>
    <windows_malware>yes</windows_malware>
  </rootcheck>

  <!-- ===================== WINDOWS EVENT LOG ===================== -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID != 5145 and EventID != 5156]</query>
  </localfile>

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Sysmon (if installed) -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

</ossec_config>
