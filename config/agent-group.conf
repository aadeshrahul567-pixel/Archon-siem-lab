<agent_config>
  <!-- ===================== AGENT GROUP — SYSCHECK CONFIG ===================== -->
  <!-- Apply this to an agent group in the Wazuh Manager for centralized control -->

  <syscheck>
    <frequency>1800</frequency>

    <!-- Monitor important directories -->
    <directories check_all="yes">/etc,/var/www,/home</directories>

    <!-- Skip noisy/cache paths -->
    <nodiff>/var/www/cache</nodiff>
    <skip_nfs>yes</skip_nfs>
  </syscheck>

</agent_config>
