<ossec_config>

  <!-- ===================== GLOBAL SETTINGS ===================== -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
  </global>

  <!-- ===================== RULESET ===================== -->
  <ruleset>
    <rule_dir>/var/ossec/etc/rules</rule_dir>
    <rule_dir>/var/ossec/rules</rule_dir>
    <local_rules>yes</local_rules>
  </ruleset>

  <!-- ===================== REMOTE (AGENT CONNECTION) ===================== -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>udp</protocol>
  </remote>

  <!-- ===================== API ===================== -->
  <api>
    <enabled>yes</enabled>
    <port>55000</port>
  </api>

  <!-- ===================== SYSCHECK (FIM) ===================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- Directories to monitor on Linux -->
    <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes">/bin,/sbin</directories>

    <!-- Ignore noisy paths -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/mnttab</ignore>
    <ignore>/etc/hosts.deny</ignore>
  </syscheck>

  <!-- ===================== ROOTCHECK ===================== -->
  <rootcheck>
    <disabled>no</disabled>
    <rootkit_files>/var/ossec/etc/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <!-- ===================== VULNERABILITY DETECTION ===================== -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

</ossec_config>
